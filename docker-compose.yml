version: '3.8'

services:
  pipeline:
    build: .
    container_name: redrob_pipeline
    volumes:
      - ./Redrobsdataset:/app/data
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    # Runs the main pipeline. To run tests instead, override the command.
    command: python -m src.pipeline --input /app/data/candidates.jsonl --output-dir /app/output
