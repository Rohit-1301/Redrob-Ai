version: '3.8'

services:
  streamlit:
    build: .
    container_name: redrob_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./Redrobsdataset:/app/Redrobsdataset
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    # Default runs the CMD defined in Dockerfile (Streamlit server)

  pipeline:
    build: .
    container_name: redrob_pipeline
    volumes:
      - ./Redrobsdataset:/app/Redrobsdataset
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m src.pipeline --input /app/Redrobsdataset/candidates.jsonl --output-dir /app/output --format csv
